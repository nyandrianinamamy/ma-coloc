name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        run: flutter test

  functions:
    name: Cloud Functions Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Build Functions
        run: cd functions && npm run build

      - name: Install chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start chromedriver
        run: chromedriver --port=4444 &

      - name: Start Firebase emulators
        run: firebase emulators:start --only auth,firestore,storage,functions &

      - name: Wait for emulators
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:4400/ > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run integration tests
        run: xvfb-run flutter drive --driver=test_driver/integration_test.dart --target=integration_test/issue_flow_test.dart -d chrome
