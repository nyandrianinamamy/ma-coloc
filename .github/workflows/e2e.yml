name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install and build Cloud Functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run E2E tests
        run: |
          chromedriver --port=4444 &
          xvfb-run firebase emulators:exec --project demo-macoloc --config firebase.e2e.json \
            "flutter drive --driver=test_driver/integration_test.dart --target=integration_test/all_e2e_test.dart -d chrome --browser-name=chrome"
